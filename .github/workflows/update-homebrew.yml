name: Update Homebrew Formula

on:
  pull_request_target:
    types: [closed]
    branches: [master]

permissions:
  contents: read

jobs:
  update-homebrew:
    # Run on every merged PR except release/* (those are handled by on-release-merge.yml)
    if: |
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Get metadata
        id: meta
        run: |
          SHA=$(git rev-parse HEAD)
          VERSION=$(node -p "require('./package.json').version")
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ausardcompany/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula revision
        run: |
          FORMULA="homebrew-tap/Formula/alexi.rb"
          TAG="${{ steps.meta.outputs.tag }}"
          SHA="${{ steps.meta.outputs.sha }}"

          # Update tag and revision in the formula
          sed -i "s|tag:      \"v[^\"]*\"|tag:      \"$TAG\"|g" "$FORMULA"
          sed -i "s|revision: \"[a-f0-9]*\"|revision: \"$SHA\"|g" "$FORMULA"

          echo "Updated formula to tag=$TAG revision=$SHA"
          cat "$FORMULA"

      - name: Commit and push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if there are changes
          if git diff --quiet Formula/alexi.rb; then
            echo "No changes to formula, skipping commit"
            exit 0
          fi

          git add Formula/alexi.rb
          git commit -m "alexi ${{ steps.meta.outputs.version }}: update to ${{ steps.meta.outputs.sha }}"
          git push

      - name: Summary
        run: |
          echo "## Homebrew Formula Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** ${{ steps.meta.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users can install the latest version via:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "brew upgrade alexi" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
