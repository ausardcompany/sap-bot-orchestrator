name: Update Homebrew Formula

on:
  schedule:
    # Run once a day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-homebrew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Get metadata
        id: meta
        run: |
          SHA=$(git rev-parse HEAD)
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Ensure version tag exists
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          SHA="${{ steps.meta.outputs.sha }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            echo "Creating tag $TAG at $SHA"
            git tag "$TAG" "$SHA"
            git push origin "$TAG"
          fi

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ausardcompany/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula revision
        run: |
          FORMULA="homebrew-tap/Formula/alexi.rb"
          TAG="${{ steps.meta.outputs.tag }}"
          SHA="${{ steps.meta.outputs.sha }}"

          # Update tag and revision in the formula
          sed -i "s|tag:      \"v[^\"]*\"|tag:      \"$TAG\"|g" "$FORMULA"
          sed -i "s|revision: \"[a-f0-9]*\"|revision: \"$SHA\"|g" "$FORMULA"

          # Ensure repo URL uses the current name (handle old sap-bot-orchestrator references)
          sed -i "s|ausardcompany/sap-bot-orchestrator|ausardcompany/alexi|g" "$FORMULA"

          echo "Updated formula to tag=$TAG revision=$SHA"
          cat "$FORMULA"

      - name: Commit and push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if there are changes
          if git diff --quiet Formula/alexi.rb; then
            echo "No changes to formula, skipping commit"
            exit 0
          fi

          git add Formula/alexi.rb
          git commit -m "alexi ${{ steps.meta.outputs.version }}: update to ${{ steps.meta.outputs.sha }}"
          git push

      - name: Summary
        run: |
          echo "## Homebrew Formula Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** ${{ steps.meta.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Users can install the latest version via:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "brew upgrade alexi" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
