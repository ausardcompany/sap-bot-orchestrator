name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version and commit info
        id: info
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ steps.info.outputs.version }}
          COMMIT=${{ steps.info.outputs.commit }}
          
          # Clone homebrew-tap
          git clone https://x-access-token:${GH_TOKEN}@github.com/ausardcompany/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          
          # Create branch for update
          git checkout -b bump-sap-bot-orchestrator-${VERSION}
          
          # Update formula with new version and revision
          sed -i "s/tag:.*\"v[^\"]*\"/tag:      \"v${VERSION}\"/" Formula/sap-bot-orchestrator.rb
          sed -i "s/revision:.*\"\"/revision: \"${COMMIT}\"/" Formula/sap-bot-orchestrator.rb
          sed -i "s/revision:.*\"[a-f0-9]*\"/revision: \"${COMMIT}\"/" Formula/sap-bot-orchestrator.rb
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sap-bot-orchestrator.rb
          git commit -m "sap-bot-orchestrator ${VERSION}"
          git push -u origin bump-sap-bot-orchestrator-${VERSION}
          
          # Create PR using gh CLI
          gh pr create \
            --repo ausardcompany/homebrew-tap \
            --title "sap-bot-orchestrator ${VERSION}" \
            --body "Bump sap-bot-orchestrator to version ${VERSION}

          Automated PR from [sap-bot-orchestrator release](https://github.com/ausardcompany/sap-bot-orchestrator/releases/tag/v${VERSION}).

          After CI passes, label this PR with \`pr-pull\` to publish bottles."
