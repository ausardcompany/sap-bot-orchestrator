name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Get the commit SHA for this tag
          COMMIT_SHA=$(git rev-parse HEAD)
          VERSION=${{ steps.version.outputs.version }}
          
          # Clone homebrew-tap
          git clone https://x-access-token:${GH_TOKEN}@github.com/ausardcompany/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          
          # Update formula with new version and revision
          sed -i "s/tag: \"v[^\"]*\"/tag: \"v${VERSION}\"/" Formula/sap-bot-orchestrator.rb
          sed -i "s/revision: \"[^\"]*\"/revision: \"${COMMIT_SHA}\"/" Formula/sap-bot-orchestrator.rb
          
          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sap-bot-orchestrator.rb
          git commit -m "chore: bump sap-bot-orchestrator to v${VERSION}" || echo "No changes to commit"
          git push
