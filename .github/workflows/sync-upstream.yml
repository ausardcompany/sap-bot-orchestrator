name: Sync Upstream Changes

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Only analyze changes, do not create PR'
        type: boolean
        default: false
      force_sync:
        description: 'Sync even if no changes detected'
        type: boolean
        default: false

env:
  KILOCODE_REPO: ausard/kilocode
  KILOCODE_UPSTREAM: Kilo-Org/kilocode
  OPENCODE_REPO: ausard/opencode
  OPENCODE_UPSTREAM: anomalyco/opencode
  CLAUDE_CODE_UPSTREAM: anthropics/claude-code
  ORCHESTRATOR_REPO: ausard/alexi

permissions:
  contents: write
  pull-requests: write

jobs:
  # NOTE: This job requires GH_PAT secret to sync forks across repositories.
  # GITHUB_TOKEN cannot perform cross-repo operations.
  # If GH_PAT is not configured, this job will skip sync steps gracefully.
  sync-forks:
    name: Sync Fork Repositories
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Sync kilocode fork
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::GH_PAT not configured, skipping kilocode fork sync"
            exit 0
          fi
          echo "Syncing ${{ env.KILOCODE_REPO }} from ${{ env.KILOCODE_UPSTREAM }}..."
          gh repo sync ${{ env.KILOCODE_REPO }} --source ${{ env.KILOCODE_UPSTREAM }} --branch main || {
            echo "::warning::Failed to sync kilocode, it may already be up to date"
          }

      - name: Sync opencode fork
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::GH_PAT not configured, skipping opencode fork sync"
            exit 0
          fi
          echo "Syncing ${{ env.OPENCODE_REPO }} from ${{ env.OPENCODE_UPSTREAM }}..."
          gh repo sync ${{ env.OPENCODE_REPO }} --source ${{ env.OPENCODE_UPSTREAM }} --branch main || {
            echo "::warning::Failed to sync opencode, it may already be up to date"
          }

  analyze-and-update:
    name: Analyze Changes and Update Orchestrator
    needs: sync-forks
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
      pr_url: ${{ steps.create-pr.outputs.pr_url }}
    steps:
      - name: Checkout alexi
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone kilocode repository
        run: |
          echo "Cloning ${{ env.KILOCODE_REPO }} (public fork)..."
          git clone --depth 100 "https://github.com/${{ env.KILOCODE_REPO }}.git" ../kilocode

      - name: Clone opencode repository
        run: |
          echo "Cloning ${{ env.OPENCODE_REPO }} (public fork)..."
          git clone --depth 100 "https://github.com/${{ env.OPENCODE_REPO }}.git" ../opencode

      - name: Clone claude-code repository
        run: |
          echo "Cloning ${{ env.CLAUDE_CODE_UPSTREAM }}..."
          git clone --depth 100 "https://github.com/${{ env.CLAUDE_CODE_UPSTREAM }}.git" ../claude-code

      - name: Read previous sync commits
        id: prev-commits
        run: |
          SYNC_FILE=".github/last-sync-commits.json"
          
          if [ -f "$SYNC_FILE" ]; then
            echo "Found previous sync commits file"
            # Handle both flat and nested JSON formats
            PREV_KILOCODE=$(jq -r 'if .kilocode | type == "object" then .kilocode.last_synced_commit else .kilocode end // "none"' "$SYNC_FILE")
            PREV_OPENCODE=$(jq -r 'if .opencode | type == "object" then .opencode.last_synced_commit else .opencode end // "none"' "$SYNC_FILE")
            PREV_CLAUDE_CODE=$(jq -r 'if .["claude-code"] | type == "object" then .["claude-code"].last_synced_commit else .["claude-code"] end // "none"' "$SYNC_FILE")
          else
            echo "No previous sync commits file found, will analyze all changes"
            PREV_KILOCODE="none"
            PREV_OPENCODE="none"
            PREV_CLAUDE_CODE="none"
          fi
          
          echo "prev_kilocode=$PREV_KILOCODE" >> $GITHUB_OUTPUT
          echo "prev_opencode=$PREV_OPENCODE" >> $GITHUB_OUTPUT
          echo "prev_claude_code=$PREV_CLAUDE_CODE" >> $GITHUB_OUTPUT
          echo "Previous kilocode commit: $PREV_KILOCODE"
          echo "Previous opencode commit: $PREV_OPENCODE"
          echo "Previous claude-code commit: $PREV_CLAUDE_CODE"

      - name: Get current HEAD commits
        id: current-commits
        run: |
          CURRENT_KILOCODE=$(git -C ../kilocode rev-parse HEAD)
          CURRENT_OPENCODE=$(git -C ../opencode rev-parse HEAD)
          CURRENT_CLAUDE_CODE=$(git -C ../claude-code rev-parse HEAD)
          
          echo "current_kilocode=$CURRENT_KILOCODE" >> $GITHUB_OUTPUT
          echo "current_opencode=$CURRENT_OPENCODE" >> $GITHUB_OUTPUT
          echo "current_claude_code=$CURRENT_CLAUDE_CODE" >> $GITHUB_OUTPUT
          echo "Current kilocode commit: $CURRENT_KILOCODE"
          echo "Current opencode commit: $CURRENT_OPENCODE"
          echo "Current claude-code commit: $CURRENT_CLAUDE_CODE"

      - name: Generate diff report
        id: diff-report
        run: |
          mkdir -p .github/reports
          DIFF_FILE=".github/reports/diff-report-$(date +%Y-%m-%d).md"
          echo "diff_file=$DIFF_FILE" >> $GITHUB_OUTPUT
          
          # Run the diff report script if it exists, otherwise generate inline
          if [ -x "scripts/generate-diff-report.sh" ]; then
            ./scripts/generate-diff-report.sh \
              --kilocode-dir ../kilocode \
              --opencode-dir ../opencode \
              --last-sync ".github/last-sync-commits.json" \
              --format markdown \
              --output "$DIFF_FILE"
          else
            echo "Generating diff report inline..."
            
            cat > "$DIFF_FILE" << 'HEADER'
          # Upstream Changes Diff Report
          
          Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ## Summary
          
          HEADER
            
            # Kilocode changes
            echo "## Kilocode Changes" >> "$DIFF_FILE"
            echo "" >> "$DIFF_FILE"
            
            if [ "${{ steps.prev-commits.outputs.prev_kilocode }}" != "none" ]; then
              cd ../kilocode
              if git cat-file -t "${{ steps.prev-commits.outputs.prev_kilocode }}" >/dev/null 2>&1; then
                echo "### Commits since last sync" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                git log --oneline "${{ steps.prev-commits.outputs.prev_kilocode }}..HEAD" >> "$GITHUB_WORKSPACE/$DIFF_FILE" 2>/dev/null || echo "No new commits" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo "" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                
                echo "### Changed files" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                git diff --stat "${{ steps.prev-commits.outputs.prev_kilocode }}..HEAD" >> "$GITHUB_WORKSPACE/$DIFF_FILE" 2>/dev/null || echo "No file changes" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo "" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                
                echo "### Detailed diff" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```diff' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                git diff "${{ steps.prev-commits.outputs.prev_kilocode }}..HEAD" -- '*.ts' '*.tsx' '*.js' '*.json' >> "$GITHUB_WORKSPACE/$DIFF_FILE" 2>/dev/null || echo "No diff available" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
              else
                echo "Previous commit not found in history, showing recent commits" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                git log --oneline -20 >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
              fi
              cd "$GITHUB_WORKSPACE"
            else
              echo "No previous sync - first time analysis" >> "$DIFF_FILE"
              echo '```' >> "$DIFF_FILE"
              git -C ../kilocode log --oneline -20 >> "$DIFF_FILE"
              echo '```' >> "$DIFF_FILE"
            fi
            
            echo "" >> "$DIFF_FILE"
            
            # Opencode changes
            echo "## Opencode Changes" >> "$DIFF_FILE"
            echo "" >> "$DIFF_FILE"
            
            if [ "${{ steps.prev-commits.outputs.prev_opencode }}" != "none" ]; then
              cd ../opencode
              if git cat-file -t "${{ steps.prev-commits.outputs.prev_opencode }}" >/dev/null 2>&1; then
                echo "### Commits since last sync" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                git log --oneline "${{ steps.prev-commits.outputs.prev_opencode }}..HEAD" >> "$GITHUB_WORKSPACE/$DIFF_FILE" 2>/dev/null || echo "No new commits" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo "" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                
                echo "### Changed files" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                git diff --stat "${{ steps.prev-commits.outputs.prev_opencode }}..HEAD" >> "$GITHUB_WORKSPACE/$DIFF_FILE" 2>/dev/null || echo "No file changes" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo "" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                
                echo "### Detailed diff" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```diff' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                git diff "${{ steps.prev-commits.outputs.prev_opencode }}..HEAD" -- '*.ts' '*.tsx' '*.js' '*.json' >> "$GITHUB_WORKSPACE/$DIFF_FILE" 2>/dev/null || echo "No diff available" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
              else
                echo "Previous commit not found in history, showing recent commits" >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                git log --oneline -20 >> "$GITHUB_WORKSPACE/$DIFF_FILE"
                echo '```' >> "$GITHUB_WORKSPACE/$DIFF_FILE"
              fi
              cd "$GITHUB_WORKSPACE"
            else
              echo "No previous sync - first time analysis" >> "$DIFF_FILE"
              echo '```' >> "$DIFF_FILE"
              git -C ../opencode log --oneline -20 >> "$DIFF_FILE"
              echo '```' >> "$DIFF_FILE"
            fi
          fi
          
          echo "Diff report generated at: $DIFF_FILE"
          cat "$DIFF_FILE"

      - name: Check for meaningful changes
        id: check-changes
        run: |
          PREV_KILO="${{ steps.prev-commits.outputs.prev_kilocode }}"
          CURR_KILO="${{ steps.current-commits.outputs.current_kilocode }}"
          PREV_OPEN="${{ steps.prev-commits.outputs.prev_opencode }}"
          CURR_OPEN="${{ steps.current-commits.outputs.current_opencode }}"
          PREV_CLAUDE="${{ steps.prev-commits.outputs.prev_claude_code }}"
          CURR_CLAUDE="${{ steps.current-commits.outputs.current_claude_code }}"
          FORCE_SYNC="${{ inputs.force_sync }}"
          
          HAS_CHANGES="false"
          
          if [ "$FORCE_SYNC" == "true" ]; then
            echo "Force sync enabled, proceeding with analysis"
            HAS_CHANGES="true"
          elif [ "$PREV_KILO" == "none" ] || [ "$PREV_OPEN" == "none" ] || [ "$PREV_CLAUDE" == "none" ]; then
            echo "First time sync, proceeding with analysis"
            HAS_CHANGES="true"
          elif [ "$PREV_KILO" != "$CURR_KILO" ] || [ "$PREV_OPEN" != "$CURR_OPEN" ] || [ "$PREV_CLAUDE" != "$CURR_CLAUDE" ]; then
            echo "Changes detected in upstream repositories"
            HAS_CHANGES="true"
          else
            echo "No changes detected in upstream repositories"
          fi
          
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT

      - name: Exit if no changes
        if: steps.check-changes.outputs.has_changes == 'false'
        run: |
          echo "No changes detected and force_sync is not enabled. Exiting."
          exit 0

      - name: Setup Node.js
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Alexi CLI
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          echo "Installing dependencies..."
          npm ci
          echo "Building project..."
          npm run build
          echo "[OK] Alexi CLI built successfully"
          node dist/cli/program.js --help

      # =================================================================
      # TWO-STAGE UPDATE PROCESS
      # Stage 1: Planning with Opus (detailed analysis and plan creation)
      # Stage 2: Execution with Sonnet (apply the plan)
      # =================================================================

      - name: Create planning prompt
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          DIFF_FILE="${{ steps.diff-report.outputs.diff_file }}"
          mkdir -p .github/prompts
          
          # Create planning prompt with diff report embedded
          cat > .github/prompts/planning-prompt.md << 'PLANNING_EOF'
          # Planning Task: Analyze Upstream Changes for Alexi

          You are a senior software architect analyzing upstream changes from three AI coding assistant repositories:
          - **kilocode** (Kilo-Org/kilocode) - Kilo AI coding assistant
          - **opencode** (anomalyco/opencode) - OpenCode AI terminal assistant  
          - **claude-code** (anthropics/claude-code) - Anthropic's Claude Code CLI

          ## Diff Report

          PLANNING_EOF
          
          # Append the actual diff report
          cat "$DIFF_FILE" >> .github/prompts/planning-prompt.md
          
          # Append instructions
          cat >> .github/prompts/planning-prompt.md << 'PLANNING_INSTRUCTIONS'

          ## Your Task

          Create a **detailed update plan** for Alexi based on the changes above.

          ### File Mapping
          - Tool system changes → `src/tool/`
          - Agent system changes → `src/agent/`
          - Permission system changes → `src/permission/`
          - Event bus changes → `src/bus/`
          - Core orchestration changes → `src/core/`
          - Provider changes → `src/providers/`
          - Router changes → `src/router/`
          - CLI changes → `src/cli/`

          ### For Each Change, Provide:
          1. **File path** to modify (or create)
          2. **Function/class** to change
          3. **Code snippet** showing the exact change (before/after or new code)
          4. **Priority**: critical | high | medium | low
          5. **Reasoning**: Why this change is needed

          ### Important Considerations
          - Maintain compatibility with SAP AI Core integration
          - Preserve existing SAP-specific customizations
          - Follow existing code style and patterns
          - Prioritize: security fixes > bug fixes > features > refactoring
          - Do NOT include changes that would break existing functionality

          ### Output Format

          ```markdown
          # Update Plan for Alexi

          Generated: [date]
          Based on upstream commits: [list commits analyzed]

          ## Summary
          - Total changes planned: X
          - Critical: X | High: X | Medium: X | Low: X

          ## Changes

          ### 1. [Brief description]
          **File**: `src/path/to/file.ts`
          **Priority**: high
          **Type**: feature | bugfix | security | refactor
          **Reason**: [Why this change is needed]

          **Current code** (if modifying):
          ```typescript
          // existing code
          ```

          **New code**:
          ```typescript
          // code to add or replace with
          ```

          ### 2. [Next change...]
          ...

          ## Testing Recommendations
          - [What to test after applying these changes]

          ## Potential Risks
          - [Any breaking changes or risks to be aware of]
          ```

          Output ONLY the plan in the format above. No conversational text.
          PLANNING_INSTRUCTIONS
          
          echo "[OK] Planning prompt created at .github/prompts/planning-prompt.md"
          echo "Prompt size: $(wc -c < .github/prompts/planning-prompt.md) bytes"

      - name: Generate update plan (Opus)
        if: steps.check-changes.outputs.has_changes == 'true'
        id: plan
        env:
          AICORE_SERVICE_KEY: ${{ secrets.AICORE_SERVICE_KEY }}
          AICORE_RESOURCE_GROUP: ${{ secrets.AICORE_RESOURCE_GROUP }}
        run: |
          PLAN_FILE=".github/reports/update-plan-$(date +%Y-%m-%d).md"
          mkdir -p .github/reports
          echo "plan_file=$PLAN_FILE" >> $GITHUB_OUTPUT
          
          echo "=== Stage 1: Generating update plan with Claude 4.5 Opus ==="
          echo "This may take a few minutes..."
          
          # Use --message-file to avoid shell escaping issues with complex prompts
          node dist/cli/program.js chat \
            --message-file .github/prompts/planning-prompt.md \
            --model "anthropic--claude-4.5-opus" \
            --system "You are a senior software architect. Analyze upstream changes and create a detailed, actionable update plan with code snippets. Output ONLY the plan in markdown format. Be thorough and precise." \
            > "$PLAN_FILE"
          
          echo ""
          echo "=== Plan generated at: $PLAN_FILE ==="
          echo "Plan size: $(wc -l < "$PLAN_FILE") lines"
          echo ""
          echo "--- Plan Preview (first 50 lines) ---"
          head -50 "$PLAN_FILE"
          echo "--- End Preview ---"

      - name: Create execution prompt
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          PLAN_FILE="${{ steps.plan.outputs.plan_file }}"
          
          cat > .github/prompts/execution-prompt.md << 'EXEC_HEADER'
          # Execution Task: Apply Update Plan to Alexi

          You are an expert software developer. Your task is to execute the update plan below precisely.

          ## Update Plan to Execute

          EXEC_HEADER
          
          # Append the generated plan
          cat "$PLAN_FILE" >> .github/prompts/execution-prompt.md
          
          # Append execution instructions
          cat >> .github/prompts/execution-prompt.md << 'EXEC_INSTRUCTIONS'

          ## Execution Instructions

          1. **Execute each change** in the plan above in order of priority (critical → high → medium → low)
          2. **Make exact code changes** as specified in the plan
          3. **Maintain SAP AI Core compatibility** - do not break existing integrations
          4. **Follow existing code style** in this repository
          5. **Create changes summary** at `.github/reports/changes-summary.md` with:
             - List of files modified
             - Summary of each change made
             - Any issues encountered

          ## Important

          - Do NOT skip any items in the plan
          - Do NOT add extra changes not in the plan
          - Do NOT ask questions - just execute
          - If a file doesn't exist, create it
          - If code context is unclear, use your best judgment based on the plan

          Execute the entire plan now.
          EXEC_INSTRUCTIONS
          
          echo "[OK] Execution prompt created at .github/prompts/execution-prompt.md"
          echo "Prompt size: $(wc -c < .github/prompts/execution-prompt.md) bytes"

      - name: Execute update plan (Sonnet with tools)
        if: steps.check-changes.outputs.has_changes == 'true'
        id: execute
        env:
          AICORE_SERVICE_KEY: ${{ secrets.AICORE_SERVICE_KEY }}
          AICORE_RESOURCE_GROUP: ${{ secrets.AICORE_RESOURCE_GROUP }}
        run: |
          echo "=== Stage 2: Executing update plan with Claude 4.5 Sonnet (agentic mode) ==="
          echo "This stage uses tools to write/edit files directly..."
          
          # Create system prompt for execution
          cat > .github/prompts/execution-system.txt << 'EXEC_SYSTEM'
          You are an expert software developer executing an update plan for the Alexi project.

          CRITICAL INSTRUCTIONS:
          1. Read the update plan carefully
          2. For each change in the plan:
             - Use 'read' tool to examine existing files before modifying
             - Use 'write' tool to create new files
             - Use 'edit' tool to modify existing files precisely
          3. Follow the exact code changes specified in the plan
          4. Maintain SAP AI Core compatibility - do not break existing integrations
          5. After making all changes, provide a brief summary of what was done

          IMPORTANT:
          - Execute ALL changes in the plan, in priority order (critical -> high -> medium -> low)
          - Do NOT skip any items
          - Do NOT add extra changes not in the plan
          - If a file doesn't exist, create it with the 'write' tool
          EXEC_SYSTEM
          
          SYSTEM_PROMPT=$(cat .github/prompts/execution-system.txt)
          
          # Use 'agent' command which enables tool execution loop
          # Disable git auto-commits since the workflow has its own commit step
          # Enable debug messages to diagnose intermittent API 400 errors
          export ALEXI_DEBUG_MESSAGES=1
          
          # Retry up to 3 times — SAP AI Core occasionally returns transient 400 errors
          MAX_RETRIES=3
          RETRY=0
          EXEC_EXIT_CODE=1
          while [ "$RETRY" -lt "$MAX_RETRIES" ] && [ "$EXEC_EXIT_CODE" -ne 0 ]; do
            RETRY=$((RETRY + 1))
            if [ "$RETRY" -gt 1 ]; then
              echo "Retry $RETRY/$MAX_RETRIES after previous failure..."
              sleep 10
            fi
            set +e
            node dist/cli/program.js agent \
              --message-file .github/prompts/execution-prompt.md \
              --model "anthropic--claude-4.5-sonnet" \
              --max-iterations 50 \
              --tools "read,write,edit,glob,grep" \
              --workdir "$(pwd)" \
              --verbose \
              --no-auto-commits \
              --no-dirty-commits \
              --system "$SYSTEM_PROMPT" \
              > .github/reports/execution-output.log 2>&1
            EXEC_EXIT_CODE=$?
            set -e
          done
          
          echo ""
          echo "=== Execution complete (exit code: $EXEC_EXIT_CODE) ==="
          echo ""
          echo "--- Execution Output (last 100 lines) ---"
          tail -100 .github/reports/execution-output.log
          echo "--- End Output ---"
          
          # Fail the step if the agent command failed
          if [ "$EXEC_EXIT_CODE" -ne 0 ]; then
            echo "::error::Agent command failed with exit code $EXEC_EXIT_CODE"
            exit 1
          fi

      - name: Check for bot changes
        if: steps.check-changes.outputs.has_changes == 'true'
        id: kilo-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "kilo_made_changes=true" >> $GITHUB_OUTPUT
            echo "Kilo made the following changes:"
            git status --short
            git diff --stat

            # Capture file change stats for PR body
            {
              echo "diff_stat<<DIFF_STAT_EOF"
              git diff --stat
              echo "DIFF_STAT_EOF"
            } >> $GITHUB_OUTPUT

            # Capture changed file list
            {
              echo "changed_files<<CHANGED_FILES_EOF"
              git status --short
              echo "CHANGED_FILES_EOF"
            } >> $GITHUB_OUTPUT

            # Extract AI execution summary from the agent output log
            # The agent's final text summary typically appears after the tool call list
            {
              echo "ai_summary<<AI_SUMMARY_EOF"
              if [ -f .github/reports/execution-output.log ]; then
                # Extract everything after "[Complete:" line to end, skipping tool metadata
                sed -n '/\[Complete:/,$ { /^\[/d; /^$/d; p }' .github/reports/execution-output.log | head -80
              fi
              echo "AI_SUMMARY_EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "kilo_made_changes=false" >> $GITHUB_OUTPUT
            echo "No changes were made by Kilo"
          fi

      - name: Output proposed changes (dry run)
        if: inputs.dry_run == true && steps.kilo-changes.outputs.kilo_made_changes == 'true'
        run: |
          echo "=== DRY RUN MODE ==="
          echo ""
          echo "The following changes would be made:"
          echo ""
          git diff
          echo ""
          echo "Changed files:"
          git status --short
          echo ""
          echo "=== END DRY RUN ==="

      # =================================================================
      # CREATE PR (branch protection safe — never pushes directly to master)
      # The AI-generated changes are committed to a dated feature branch.
      # auto-merge.yml then enables squash auto-merge so it lands in master
      # automatically once CI passes.
      # =================================================================

      - name: Commit changes to feature branch and open PR
        if: inputs.dry_run != true && steps.kilo-changes.outputs.kilo_made_changes == 'true'
        id: commit-changes
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a dated feature branch (include run number for same-day retries)
          BRANCH="auto/sync-upstream-$(date +%Y-%m-%d)-run${{ github.run_number }}"
          git checkout -b "$BRANCH"

          # ── Auto-bump patch version ───────────────────────────────────
          OLD_VERSION=$(node -p "require('./package.json').version")
          # Increment patch: 0.1.8 → 0.1.9, 0.1.99 → 0.1.100, etc.
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          # Update package.json version in-place
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Version bumped: $OLD_VERSION → $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # ── Update last-sync-commits.json ─────────────────────────────
          mkdir -p .github
          SYNCED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          cat > .github/last-sync-commits.json << SYNC_EOF
          {
            "kilocode": {
              "last_synced_commit": "${{ steps.current-commits.outputs.current_kilocode }}",
              "last_synced_at": "$SYNCED_AT",
              "upstream": "Kilo-Org/kilocode",
              "fork": "ausard/kilocode"
            },
            "opencode": {
              "last_synced_commit": "${{ steps.current-commits.outputs.current_opencode }}",
              "last_synced_at": "$SYNCED_AT",
              "upstream": "anomalyco/opencode",
              "fork": "ausard/opencode"
            },
            "claude-code": {
              "last_synced_commit": "${{ steps.current-commits.outputs.current_claude_code }}",
              "last_synced_at": "$SYNCED_AT",
              "upstream": "anthropics/claude-code",
              "fork": "direct-clone"
            },
            "metadata": {
              "version": "1.1.0",
              "workflow_run": "${{ github.run_id }}",
              "description": "Tracks last synced commits from upstream repositories"
            }
          }
          SYNC_EOF

          # ── Stage & commit ────────────────────────────────────────────
          git add -A

          # --no-verify: skip pre-commit hooks — AI-generated code
          # will be reviewed in the PR and checked by CI
          git commit --no-verify -m "feat(sync): apply upstream changes ($(date +%Y-%m-%d))

          Synchronized changes from upstream repositories:
          - kilocode: ${{ steps.prev-commits.outputs.prev_kilocode }} -> ${{ steps.current-commits.outputs.current_kilocode }}
          - opencode: ${{ steps.prev-commits.outputs.prev_opencode }} -> ${{ steps.current-commits.outputs.current_opencode }}
          - claude-code: ${{ steps.prev-commits.outputs.prev_claude_code }} -> ${{ steps.current-commits.outputs.current_claude_code }}

          Version bump: $OLD_VERSION → $NEW_VERSION

          Two-stage AI process:
          - Stage 1 (Planning): anthropic--claude-4.5-opus
          - Stage 2 (Execution): anthropic--claude-4.5-sonnet"

          git push -u origin "$BRANCH"

          # ── Create PR with detailed change summary ────────────────────
          PLAN_FILE=".github/reports/update-plan-$(date +%Y-%m-%d).md"

          # Build the PR body (indented for YAML, then strip 10-space prefix)
          PR_BODY=$(sed 's/^          //' <<'PRBODY_EOF'
          ## Upstream Sync — SYNC_DATE

          Auto-generated by `sync-upstream.yml`.  **Version bump: OLD_VER → NEW_VER**

          ### What changed

          ```
          DIFF_STAT_PLACEHOLDER
          ```

          <details>
          <summary>AI Execution Summary</summary>

          AI_SUMMARY_PLACEHOLDER

          </details>

          ### Repositories analysed
          | Repo | Previous | Current |
          |------|----------|---------|
          REPO_TABLE_PLACEHOLDER

          ### Process
          1. **Planning** — `anthropic--claude-4.5-opus` analysed diffs and produced an update plan
          2. **Execution** — `anthropic--claude-4.5-sonnet` applied the plan using file tools

          See `PLAN_FILE_PLACEHOLDER` for the full AI-generated plan.
          PRBODY_EOF
          )

          # Fill in placeholders
          SYNC_DATE=$(date +%Y-%m-%d)
          PR_BODY="${PR_BODY//SYNC_DATE/$SYNC_DATE}"
          PR_BODY="${PR_BODY//OLD_VER/$OLD_VERSION}"
          PR_BODY="${PR_BODY//NEW_VER/$NEW_VERSION}"
          PR_BODY="${PR_BODY//PLAN_FILE_PLACEHOLDER/$PLAN_FILE}"

          # Insert diff stat
          DIFF_STAT="${{ steps.kilo-changes.outputs.diff_stat }}"
          PR_BODY="${PR_BODY//DIFF_STAT_PLACEHOLDER/$DIFF_STAT}"

          # Insert AI summary
          AI_SUMMARY="${{ steps.kilo-changes.outputs.ai_summary }}"
          if [ -z "$AI_SUMMARY" ]; then
            AI_SUMMARY="No summary extracted from agent output."
          fi
          PR_BODY="${PR_BODY//AI_SUMMARY_PLACEHOLDER/$AI_SUMMARY}"

          # Insert repo table (built line-by-line to stay inside YAML indentation)
          REPO_LINE1="| kilocode | \`${{ steps.prev-commits.outputs.prev_kilocode }}\` | \`${{ steps.current-commits.outputs.current_kilocode }}\` |"
          REPO_LINE2="| opencode | \`${{ steps.prev-commits.outputs.prev_opencode }}\` | \`${{ steps.current-commits.outputs.current_opencode }}\` |"
          REPO_LINE3="| claude-code | \`${{ steps.prev-commits.outputs.prev_claude_code }}\` | \`${{ steps.current-commits.outputs.current_claude_code }}\` |"
          REPO_TABLE="${REPO_LINE1}"$'\n'"${REPO_LINE2}"$'\n'"${REPO_LINE3}"
          PR_BODY="${PR_BODY//REPO_TABLE_PLACEHOLDER/$REPO_TABLE}"

          PR_URL=$(gh pr create \
            --title "feat(sync): apply upstream changes ($SYNC_DATE) — v$NEW_VERSION" \
            --body "$PR_BODY" \
            --base master \
            --head "$BRANCH" \
            --label "auto-sync")

          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "PR created: $PR_URL"

      - name: Summary
        run: |
          echo "## Sync Upstream Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Parameters" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Force Sync | ${{ inputs.force_sync }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes Detected | ${{ steps.check-changes.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bot Made Changes | ${{ steps.kilo-changes.outputs.kilo_made_changes }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.commit-changes.outputs.new_version }}" != "" ]; then
            echo "| Version | \`${{ steps.commit-changes.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.commit-changes.outputs.pr_url }}" != "" ]; then
            echo "| PR | ${{ steps.commit-changes.outputs.pr_url }} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.commit-changes.outputs.commit_sha }}" != "" ]; then
            echo "| Commit | \`${{ steps.commit-changes.outputs.commit_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Diff stat & changed files ──────────────────────────────────
          DIFF_STAT="${{ steps.kilo-changes.outputs.diff_stat }}"
          if [ -n "$DIFF_STAT" ]; then
            echo "### Changes Applied" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$DIFF_STAT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          CHANGED_FILES="${{ steps.kilo-changes.outputs.changed_files }}"
          if [ -n "$CHANGED_FILES" ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>Changed files</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$CHANGED_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # ── AI execution summary ───────────────────────────────────────
          AI_SUMMARY="${{ steps.kilo-changes.outputs.ai_summary }}"
          if [ -n "$AI_SUMMARY" ]; then
            echo "<details>" >> $GITHUB_STEP_SUMMARY
            echo "<summary>AI Execution Summary</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$AI_SUMMARY" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # ── Two-stage process ──────────────────────────────────────────
          echo "### Two-Stage Update Process" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Model | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1. Planning | \`anthropic--claude-4.5-opus\` | Analyze changes, create detailed plan |" >> $GITHUB_STEP_SUMMARY
          echo "| 2. Execution | \`anthropic--claude-4.5-sonnet\` | Execute plan, apply code changes |" >> $GITHUB_STEP_SUMMARY

          if [ -f "${{ steps.plan.outputs.plan_file }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Generated Plan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Plan file: \`${{ steps.plan.outputs.plan_file }}\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Commit References" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | Previous | Current |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| kilocode | \`${{ steps.prev-commits.outputs.prev_kilocode }}\` | \`${{ steps.current-commits.outputs.current_kilocode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| opencode | \`${{ steps.prev-commits.outputs.prev_opencode }}\` | \`${{ steps.current-commits.outputs.current_opencode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| claude-code | \`${{ steps.prev-commits.outputs.prev_claude_code }}\` | \`${{ steps.current-commits.outputs.current_claude_code }}\` |" >> $GITHUB_STEP_SUMMARY
